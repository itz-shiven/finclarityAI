<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Finclarity Auth</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="container" id="container">

        <!-- SIGN UP -->
        <div class="form-container sign-up-container">
            <form>
                <h1>Create Account</h1>

                <div class="social-container">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-google"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                </div>

                <span>or use your email</span>

                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">

                <button>Sign Up</button>
            </form>
        </div>

        <!-- SIGN IN -->
        <div class="form-container sign-in-container">
            <form>
                <h1>Welcome Back</h1>

                <div class="social-container">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-google"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                </div>

                <span>or use your account</span>

                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">

                <a href="#">Forgot password?</a>

                <button>Log In</button>
            </form>
        </div>

        <!-- OVERLAY -->
        <div class="overlay-container">
            <div class="overlay">

                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p style="padding-bottom: 20px;">Already have an account?</p>
                    <p style="padding-bottom: 20px;">Login with your personal info</p>
                    <button class="ghost" id="signIn">Log In</button>
                </div>

                <div class="overlay-panel overlay-right">
                    <h1 >The Future of Intelligent Financial Research
                        Platforms</h1>
                    <p style="padding-bottom: 20px;">Start your journey with us</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>

            </div>
        </div>

    </div>
    <script src="js/login.js"></script>
<b><div style="position: absolute;margin-top: 8cm;margin-left: -30cm;font-size: 1cm;" class="logo">FinClarity AI</div></b>
</body>

</html>
